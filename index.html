<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BLUSH — Luxurious Floral Experience. Minimal & luxurious daily floral arrangements.">
    <link rel="canonical" href="https://example.com/">
    <title>BLUSH — Luxurious Floral Experience</title>
    <link rel="preload" as="image" href="hero.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        /* Reset and Base Styles */
        *,*::before,*::after{box-sizing:border-box}
        html,body{height:100%}
        
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #faf6f5;
            color: #fff;
            overflow-x: hidden;
            margin: 0;
        }

        .hero-section {
            position: relative;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .hero-container {
            position: relative;
            width: min(92vw, 420px);
            aspect-ratio: 9/16;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,.15);
            background: #e7c7c7;
        }

        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: blur(1.5px) brightness(0.9);
            transform: scale(1.02);
        }

        .video-foreground {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 85%;
            object-fit: cover;
            z-index: 2;
            border-radius: 16px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            filter: none;
        }

        /* Elegant overlay effects */
        .hero-container::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(80% 60% at 50% 10%, rgba(255,255,255,.35), transparent 60%),
                       linear-gradient(to bottom, rgba(255,216,230,.18), rgba(255,255,255,0));
            backdrop-filter: blur(0px);
            z-index: 3;
            pointer-events: none;
        }

        .bloom-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(50% 50% at 50% 50%, rgba(246,214,229,0.3), transparent 70%);
            filter: blur(6px);
            opacity: 0.25;
            z-index: 4;
            pointer-events: none;
        }

        .video-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110%;
            height: 110%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 30%, transparent 70%);
            filter: blur(30px);
            z-index: 1;
            pointer-events: none;
            animation: pulseGlow 4s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { 
                opacity: 0.4;
                transform: translate(-50%, -50%) scale(1);
            }
            100% { 
                opacity: 0.7;
                transform: translate(-50%, -50%) scale(1.02);
            }
        }

        .content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            gap: 18px;
            padding: 20px 28px 28px 28px;
            z-index: 30;
        }

        .logo {
            position: absolute;
            left: calc(50% - 2cm);
            top: calc(50% + 1cm);
            transform: translate(-50%, -50%);
            z-index: 20;
            width: 140px;
            height: auto;
            opacity: 0.65;
            mix-blend-mode: soft-light;
            filter: saturate(0.8) brightness(1.05);
            transition: opacity .4s ease, transform .4s ease;
            pointer-events: none;
        }

        /* Responsive logo positioning */
        @media (min-width: 769px) {
            .hero-container {
                width: min(520px, 50vw);
            }
            .logo {
                width: 180px;
            }
        }

        @media (max-width: 768px) {
            .logo {
                width: 120px;
            }
        }

        h1 {
            margin: 0;
            padding: 0 18px;
            font-family: 'Playfair Display', 'Times New Roman', serif;
            font-size: clamp(1rem, 2.2vw, 1.4rem);
            font-weight: 600;
            letter-spacing: .06em;
            text-shadow: 0 2px 8px rgba(0,0,0,.25);
            color: #FFFFFF;
            line-height: 1.2;
            text-transform: uppercase;
            font-style: italic;
        }

        .subtitle {
            font-size: 11px;
            opacity: .9;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            line-height: 1.3;
            font-weight: 300;
            padding: 0 20px;
        }

        .cta {
            display: flex;
            gap: 12px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            appearance: none;
            border: 0;
            padding: 10px 16px;
            border-radius: 999px;
            font-weight: 600;
            background: linear-gradient(90deg, #f4d03f, #f5b7b1);
            color: #4a3b2f;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(0,0,0,.18);
            transition: transform .2s ease, opacity .2s ease;
            text-decoration: none;
            letter-spacing: .03em;
            backdrop-filter: blur(6px);
        }

        .btn.secondary {
            background: linear-gradient(90deg, #f0e6e6, #e6d5c3);
            color: #4a3b2f;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        /* Responsive adjustments */
        @media (max-width: 380px) {
            .logo { font-size: 48px; }
            h1 { font-size: 14px; }
            .subtitle { font-size: 10px; }
        }

        @media (max-width: 768px) {
            .cta {
                flex-direction: column;
                align-items: center;
            }
        }

        /* Reduced motion support */
        @media (prefers-reduced-motion: reduce) {
            .btn { transition: none; }
            .video-glow { animation: none; }
        }

        /* Fade-in animations */
        .fade-in {
            opacity: 0;
            transform: translateY(8px);
            transition: opacity .6s ease, transform .6s ease;
        }

        /* Top-aligned overlay for hero text */
        .text-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 28%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            z-index: 40; /* above logo */
            padding: 18px 24px;
            text-align: center;
            pointer-events: none;
        }
        @media (min-width: 769px) {
            .text-overlay { height: 24%; }
        }

        .visible {
            opacity: 1 !important;
            transform: none !important;
        }

        /* Ensure content is visible by default if JS fails */
        .fade-in:not(.visible) {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <main class="hero-section">
        <section class="hero-container" id="hero">
            <!-- Logo -->
            <img src="./logo.svg" alt="BLUSH logo" class="logo fade-in">
            
            <!-- Background Video (Blurred) -->
            <video class="video-background" autoplay muted loop playsinline>
                <source src="./IMG_1600 (2).mp4" type="video/mp4">
            </video>
            
            <!-- Foreground Video (Original) -->
            <video class="video-foreground" autoplay muted loop playsinline poster="./public/hero.jpg">
                <source src="./IMG_1600 (2).mp4" type="video/mp4">
            </video>
            
            <!-- Bloom Effect -->
            <div class="bloom-overlay"></div>
            
            <!-- Video Glow Effect -->
            <div class="video-glow"></div>
            
            <!-- Centered Text Overlay -->
            <div class="text-overlay fade-in">
                <h1>BLUSH — A LUXURIOUS FLORAL EXPERIENCE</h1>
                <div class="subtitle">Minimal & luxurious daily arrangements • Everlasting collections</div>
            </div>

            <!-- Content (CTA) -->
            <div class="content">
                <div class="cta fade-in">
                    <a class="btn" href="https://wa.me/989900190067" rel="noopener">Chat on WhatsApp</a>
                    <a class="btn secondary" href="#collections">View Collections</a>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Smooth fade-in animations with IntersectionObserver
        document.addEventListener('DOMContentLoaded', function() {
            const io = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.fade-in').forEach(element => {
                io.observe(element);
                // Fallback: make visible after 1 second if not triggered
                setTimeout(() => {
                    if (!element.classList.contains('visible')) {
                        element.classList.add('visible');
                    }
                }, 1000);
            });
        });

        // Video loading optimization
        document.addEventListener('DOMContentLoaded', function() {
            const videos = document.querySelectorAll('video');
            videos.forEach((video, index) => {
                video.addEventListener('loadstart', () => {
                    console.log(`Video ${index + 1} started loading`);
                });
                
                video.addEventListener('canplay', () => {
                    console.log(`Video ${index + 1} can play`);
                });
                
                video.addEventListener('error', (e) => {
                    console.error(`Video ${index + 1} error:`, e);
                    console.log(`Video ${index + 1} failed to load, trying fallback`);
                });
            });
        });

        // WhatsApp integration
        function openWhatsApp() {
            const phoneNumber = '989900190067';
            const message = 'Hello! I would like to know more about your floral arrangements';
            const url = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
